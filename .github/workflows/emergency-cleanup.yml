name: Emergency Release Cleanup

# Adapting to Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Target Release Tag'
        required: true
        type: string
      issue_type:
        description: 'Issue Type'
        required: true
        type: choice
        options:
          - Normal
          - Bug
          - Critical
      reference:
        description: 'Issue link or description, optional'
        required: false
        type: string

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Only repository owners are allowed to execute
    if: github.actor == github.repository_owner

    steps:
      # ==================== Verify that the publication exists ====================
      - name: Verify Release exists
        run: |
          if ! gh release view "${{ inputs.target_tag }}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "::error::Release '${{ inputs.target_tag }}' does not exist"
            exit 1
          fi
          echo "✅ Found Release: ${{ inputs.target_tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Get original release information ====================
      - name: Get original release information
        id: info
        run: |
          gh release view "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --json name,body,isPrerelease > release_info.json

          jq -r '.name' release_info.json > original_title.txt
          jq -r '.body' release_info.json > original_body.txt

          IS_PRERELEASE=$(jq -r '.isPrerelease' release_info.json)
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          echo "📋 Original title: $(cat original_title.txt)"
          echo "📋 Pre-release: $IS_PRERELEASE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Handling Normal type ====================
      - name: handles Normal type - marks normal
        if: inputs.issue_type == 'Normal'
        run: |
          cat > new_body.md << 'EOF'
          > [!TIP]
          > **This version has been verified and can be used normally. **
          >
          > **This release has been verified and is safe to use.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**Reference/Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          gh release edit "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --notes-file new_body.md

          echo "✅ Release marked as Normal"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Handling Bug Types ====================
      - name: Bug type to handle
        if: inputs.issue_type == 'Bug'
        run: |
          cat > new_body.md << 'EOF'
          > [!WARNING]
          > **This version has known bugs and it is recommended to use it with caution. **
          >
          > **This release contains known bugs, use with caution.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**Reference/Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          gh release edit "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --notes-file new_body.md

          echo "✅ Release instructions updated (Bug)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Handling Critical types ====================
      - name: Handle Critical type - delete and rebuild
        if: inputs.issue_type == 'Critical'
        run: |
          ORIGINAL_TITLE=$(cat original_title.txt)

          # Build warning message
          cat > new_body.md << 'EOF'
          > [!CAUTION]
          > **The resources released this time contain serious bugs that cause crashes, and all attachments have been cleared! **
          >
          > **Do not use this version, wait for the fix version to be released. **
          >
          > **This release contained a critical bug causing device crashes. All assets have been removed!**
          >
          > **DO NOT use this version. Please wait for a fixed release.**
          EOF

          sed -i 's/^          //' new_body.md

          if [ -n "${{ inputs.reference }}" ]; then
            echo "" >> new_body.md
            echo "**Reference/Reference**: ${{ inputs.reference }}" >> new_body.md
          fi

          echo "" >> new_body.md
          echo "---" >> new_body.md
          echo "" >> new_body.md
          cat original_body.txt >> new_body.md

          # Delete Release (Keep Git Tag)
          echo "🗑️ Delete the original Release..."
          gh release delete "${{ inputs.target_tag }}" --repo ${{ github.repository }} --yes

          # Determine prerelease flag
          PRERELEASE_FLAG=""
          if [ "${{ steps.info.outputs.is_prerelease }}" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Rebuild Release (without uploading any files)
          echo "🔄 Rebuild Release..."
          gh release create "${{ inputs.target_tag }}" --repo ${{ github.repository }} \
            --title "$ORIGINAL_TITLE" \
            --notes-file new_body.md \
            $PRERELEASE_FLAG

          echo "✅ Cleared all attachments and rebuilt Release (Critical)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==================== Completion notification ====================
      - name: completed
        run: |
          echo "=========================================="
          echo "🎯 Target tag: ${{ inputs.target_tag }}"
          echo "📌 Question type: ${{ inputs.issue_type }}"
          echo "📝 Reference information: ${{ inputs.reference || '无' }}"
          echo "=========================================="
          echo "✅ Emergency cleanup completed!"
